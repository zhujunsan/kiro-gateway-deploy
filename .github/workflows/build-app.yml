name: build-app

on:
  push:
    tags: ["app-v*"]
  pull_request:
    paths: ["app/**", ".github/workflows/build-app.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux GUI/tray deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev gir1.2-appindicator3-0.1 \
            gobject-introspection libcairo2-dev pkg-config
        working-directory: ${{ github.workspace }}

      - name: Install packaging tools (macOS – create-dmg)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Fetch appimagetool (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          curl -fsSL -o build/appimagetool-x86_64.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build/appimagetool-x86_64.AppImage

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Vendor upstream + patch
        run: python scripts/vendor_sync.py

      - name: Fetch cloudflared (current platform)
        run: python scripts/fetch_cloudflared.py --current-only

      - name: Run tests
        run: python -m pytest -q

      - name: Inject repo metadata
        env:
          UPSTREAM_REPO_OVERRIDE: ${{ vars.UPSTREAM_REPO || '' }}
          UPSTREAM_SHA_OVERRIDE: ${{ vars.UPSTREAM_SHA || '' }}
        run: |
          python -c "
          import re, os
          f = 'kiro_gateway_tray/__init__.py'
          txt = open(f).read()
          repo = os.environ['GITHUB_REPOSITORY']
          tag = os.environ.get('GITHUB_REF_NAME', '')
          txt = re.sub(r'GITHUB_REPO = \"[^\"]+\"', f'GITHUB_REPO = \"{repo}\"', txt)
          if tag.startswith('app-v'):
              ver = tag.removeprefix('app-v')
              txt = re.sub(r'__version__ = \"[^\"]+\"', f'__version__ = \"{ver}\"', txt)
          upstream_repo = os.environ.get('UPSTREAM_REPO_OVERRIDE', '')
          if upstream_repo:
              txt = re.sub(r'UPSTREAM_REPO = \"[^\"]+\"', f'UPSTREAM_REPO = \"{upstream_repo}\"', txt)
          upstream_sha = os.environ.get('UPSTREAM_SHA_OVERRIDE', '')
          if upstream_sha:
              txt = re.sub(r'UPSTREAM_SHA = \"[^\"]+\"', f'UPSTREAM_SHA = \"{upstream_sha}\"', txt)
          open(f, 'w').write(txt)
          "

      - name: Build with PyInstaller
        run: pyinstaller packaging/kiro_gateway_tray.spec --noconfirm

      - name: Package dist
        run: python packaging/make_dist.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiro-gateway-tray-${{ matrix.os }}
          path: app/release/*

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/app-v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
