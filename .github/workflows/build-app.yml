name: build-app

on:
  push:
    tags: ["v*"]
  pull_request:
    paths: ["app/**", ".github/workflows/build-app.yml"]
  workflow_dispatch:

concurrency:
  group: build-app-${{ github.ref }}
  # Cancel superseded runs on PR/branch pushes, but never cancel tag releases.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
          - os: macos-15-intel
            arch: x64
          - os: windows-latest
            arch: amd64
          - os: ubuntu-latest
            arch: amd64
    env:
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11.9"

      - name: Install Linux GUI/tray deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev gir1.2-appindicator3-0.1 \
            gobject-introspection libcairo2-dev pkg-config

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Vendor upstream + patch
        run: python scripts/vendor_sync.py

      - name: Fetch cloudflared (current platform)
        run: python scripts/fetch_cloudflared.py --current-only

      - name: Run tests
        run: python -m pytest -q

      # --- Packaging only runs for releases (tags) or manual dispatch ---

      - name: Install packaging tools (macOS – create-dmg)
        if: env.IS_RELEASE == 'true' && runner.os == 'macOS'
        run: brew install create-dmg

      - name: Fetch appimagetool (Linux)
        if: env.IS_RELEASE == 'true' && runner.os == 'Linux'
        run: |
          mkdir -p build
          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors \
            -o build/appimagetool-x86_64.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build/appimagetool-x86_64.AppImage

      - name: Inject repo metadata
        if: env.IS_RELEASE == 'true'
        env:
          UPSTREAM_REPO_OVERRIDE: ${{ vars.UPSTREAM_REPO || '' }}
          UPSTREAM_SHA_OVERRIDE: ${{ vars.UPSTREAM_SHA || '' }}
        run: python scripts/inject_metadata.py

      # UPX-compress cloudflared only (it runs as a standalone child process, so
      # compressing it is safe). macOS is skipped: UPX breaks Apple Silicon signing.
      - name: Install UPX (Linux)
        if: env.IS_RELEASE == 'true' && runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install UPX (Windows)
        if: env.IS_RELEASE == 'true' && runner.os == 'Windows'
        run: choco install upx -y

      - name: Compress cloudflared
        if: env.IS_RELEASE == 'true' && runner.os != 'macOS'
        run: python scripts/compress_cloudflared.py

      - name: Build with PyInstaller
        if: env.IS_RELEASE == 'true'
        run: pyinstaller packaging/kiro_gateway_tray.spec --noconfirm

      - name: Package dist
        if: env.IS_RELEASE == 'true'
        run: python packaging/make_dist.py

      - name: Upload artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: kiro-gateway-tray-${{ matrix.os }}-${{ matrix.arch }}
          path: app/release/*

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11.9"

      - name: Extract changelog for this tag
        id: changelog
        working-directory: app
        run: |
          notes=$(python scripts/extract_changelog.py "${GITHUB_REF_NAME}")
          {
            echo "body<<__CHANGELOG_EOF__"
            echo "$notes"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          body: ${{ steps.changelog.outputs.body }}
          append_body: true
          generate_release_notes: true

  bump-cask:
    name: bump homebrew cask
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11.9"

      - name: Bump cask version + sha256 from release DMGs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          read_sha() {
            gh release download "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              --pattern "KiroGatewayTray-${VERSION}-macos-$1.dmg.sha256" \
              --clobber -O - | awk '{print $1}'
          }
          python app/scripts/bump_cask.py "${VERSION}" \
            --arm-sha "$(read_sha arm64)" \
            --intel-sha "$(read_sha amd64)"

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- Casks/; then
            echo "cask already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/kiro-gateway-tray.rb
          git commit -m "ci(app): bump homebrew cask to ${GITHUB_REF_NAME}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
